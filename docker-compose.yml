services:
  postgres-ea-nation:
    image: postgres:17.0
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/var/lib/postgresql/data/ea-nation
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT}:5432"

  dns:
    build: ./dns-server
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"

  ea-sslv2-stunnel:
    image: ghcr.io/a-blondel/ea-sslv2-stunnel/ea-sslv2-stunnel:latest
    restart: unless-stopped
    environment:
      SSL_SERVICES: >-
        ps2nfs05:20900;
        pcnfs05:20920,20970;
        ps2nfs06:30900;
        pcnfs06:30920;
        pspnfs06:30980;
        pspnba06:30190;
        pspkok06:31570,31590;
        pspuefa06:31280,31290;
        ps2nascar07:10600;
        ps2fifa06:30400;
        ps2ssx04:11000;
        ps2marvel06:31700,31720;
        ps2afl06:31400;
        ps2afl07:12400;
        ps2burnout05:21800;
        ps2burnout06:31800;
        ps2uefa06:31200;
        ps2kok06:31500;
        ps2mvp06:30800;
        ps2nba06:30100;
        ps2nbastreet05:21000;
        ps2mm06:30700;
        ps2uefa05:20480;
        ps2tw06:30200;
        ps2coach06:31300;
        ps2nflstreet05:21300;
        ps2nflstreet07:11700;
        ps2nhl06:30300
      # Disabled services:
      # ;ps2ncaa05:20500
      # ;pspfifa06:30480
      # ;pspmadden06:30090
      # ;ps2fifa05east:20400
      # ;ps2madden06:30000
      # ;ps2mvp05:20800
