      # ;ps2nba05:20100
      # ;ps2ncaa06:30500
      # ;ps2mm05:20700
      # ;ps2nhl05:20300

      REDIRECT_IP: ${TCP_HOST_IP}
    ports:
      - "10601:10601" # ps2 nascar07 ssl
      - "11001:11001" # ps2 ssx04 ssl
      - "11701:11701" # ps2 nflstreet07 ssl
      - "12401:12401" # ps2 afl07 ssl
      - "20481:20481" # ps2 uefa05 ssl
      #- "20501:20501" # ps2 ncaa05 ssl
      - "20901:20901" # ps2 nfs05 ssl
      - "20921:20921" # pc nfs05 ssl (ntsc)
      - "20971:20971" # pc nfs05 ssl (pal)
      - "21001:21001" # ps2 nbastreet05 ssl
      - "21301:21301" # ps2 nflstreet05 ssl
      - "21801:21801" # ps2 burnout05 ssl
      - "30101:30101" # ps2 nba06 ssl
      - "30191:30191" # psp nba06 ssl
      - "30201:30201" # ps2 tw06 ssl
      - "30301:30301" # ps2 nhl06 ssl
      - "30401:30401" # ps2 fifa06 ssl
      - "30701:30701" # ps2 mm06 ssl
      - "30801:30801" # ps2 mvp06 ssl
      - "30901:30901" # ps2 nfs06 ssl
      - "30921:30921" # pc nfs06 ssl
      - "30981:30981" # psp nfs06 ssl
      - "31201:31201" # ps2 uefa06 ssl
      - "31281:31281" # psp worldcup06 ssl (ntsc)
      - "31291:31291" # psp worldcup06 ssl (pal)
      - "31301:31301" # ps2 coach06 ssl
      - "31401:31401" # ps2 afl06 ssl
      - "31501:31501" # ps2 kok06 ssl
      - "31571:31571" # psp kok06 ssl (pal)
      - "31591:31591" # psp kok06 ssl (ntsc)
      - "31701:31701" # ps2 marvel06 ssl
      - "31721:31721" # ps2 marvel06 ssl (pal)
      - "31801:31801" # ps2 burnout06 ssl

  ea-nation-server:
    image: ghcr.io/ea-nation-hub/ea-nation-server/ea-nation-gameserver:latest
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=${ENVIRONMENT}
      - DB_URL=jdbc:postgresql://postgres-ea-nation:5432/${DB_NAME}
      - DB_USERNAME
      - DB_PASSWORD
      - TCP_HOST_IP
      - TCP_DEBUG_BUDDY=${TCP_DEBUG_BUDDY}
      - TCP_DEBUG_ENABLED=${TCP_DEBUG_ENABLED}
      - TCP_DEBUG_INLINE=${TCP_DEBUG_INLINE}
      - TCP_DEBUG_EXCLUSIONS=~png,+snp
      - SSL_DEBUG_ENABLED=false
      - CONTENT_URL=http://${CONTENT_URL}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - LOGS=/var/log/ea-nation
      - HTTP_TUNNEL_ENABLED=${HTTP_TUNNEL_ENABLED}
      - QA_TESTERS_WHITELIST=${QA_TESTERS_WHITELIST}
    volumes:
      - app_logs:/var/log/ea-nation
    networks:
      - traefik-public
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ea-nation.rule=Host(`eahub.eu`)"
      - "traefik.http.routers.ea-nation.entrypoints=web"
      - "traefik.http.services.ea-nation.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-public"
