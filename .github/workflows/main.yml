        address=/ps2nascar09.ea.com/${{ secrets.SERVER_IP }}
        address=/ps2nba06.ea.com/${{ secrets.SERVER_IP }}
        address=/ps2nba07.ea.com/${{ secrets.SERVER_IP }}
        address=/ps2nba08.ea.com/${{ secrets.SERVER_IP }}
        address=/ps2nbastreet05.ea.com/${{ secrets.SERVER_IP }}
        address=/ps2ncaa05.ea.com/${{ secrets.SERVER_IP }}
